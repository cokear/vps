name: Ulzix Auto Checkin

on:
  repository_dispatch:
    types: [ulzix]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true

      - name: Setup Proxy Tunnel (Sing-box)
        env:
          PROXY_STR: ${{ secrets.PROXY_UPSTREAM }}
        run: |
          [ -n "${PROXY_STR:-}" ] || (echo "PROXY_UPSTREAM is empty" && exit 1)
          wget -qO- https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz | tar xz
          sudo mv sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
          python3 convert_proxy.py
          nohup sing-box run -c config.json > singbox.log 2>&1 &
          sleep 5
          curl -s -o /dev/null --connect-timeout 10 -x http://127.0.0.1:8080 https://api.ipify.org && echo "✅ Tunnel OK"

      - name: Setup environment
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          echo "[setup] apt update"
          sudo -E apt-get update
          echo "[setup] apt install"
          sudo -E apt-get install -y -o Dpkg::Use-Pty=0 \
            xvfb xdotool python3 python3-pip python3-tk python3-dev \
            google-chrome-stable fontconfig \
            fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          echo "[setup] pip install python deps"
          python3 -m pip install --upgrade pip
          python3 -m pip install seleniumbase pyvirtualdisplay requests
          echo "[setup] rebuild font cache"
          fc-cache -fv

      - name: Run python checkin flow
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BROWSER_PROXY: "127.0.0.1:8080"
        run: |
          python3 ulzix_checkin.py
