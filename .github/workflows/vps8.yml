name: Auto Renew Server Script

on:
  repository_dispatch:
    types: [vps]

jobs:
  run-renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb ffmpeg unzip wget gnupg ca-certificates fontconfig \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            fonts-wqy-zenhei \
            fonts-wqy-microhei \
            fonts-liberation

          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-linux.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

          fc-cache -fv
          fc-list | grep -i "Noto\|WenQuanYi" | head -20

      - name: Generate and start sing-box proxy
        env:
          PROXY_STR: ${{ secrets.PROXY_STR }}
          SING_BOX_VERSION: 1.8.10
        run: |
          python generate_singbox_config.py
          wget https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz
          tar -xzf sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz
          chmod +x sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box
          ./sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box check -c config.json
          nohup ./sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box run -c config.json > sing-box.log 2>&1 &
          sleep 3
          curl -x http://127.0.0.1:1080 https://api.ipify.org -v

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests

      - name: Run VPS8 Checkin Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          vps8_ACCOUNTS: ${{ secrets.VPS8_USERNAME }}:${{ secrets.VPS8_PASSWORD }}
          PROXY: http://127.0.0.1:1080
        run: python tasks/vps8_checkin.py

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: |
            screenshots/**/*.png
            screenshots/**/*.html
            ./*.html
          retention-days: 5
