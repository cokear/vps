name: Auto Renew Server Script

on:
  repository_dispatch:
    types: [vps]
  workflow_dispatch:

jobs:
  run-renew:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb ffmpeg unzip wget gnupg ca-certificates curl fontconfig \
            fonts-noto-cjk fonts-noto-color-emoji \
            fonts-wqy-zenhei fonts-wqy-microhei fonts-liberation

          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub \
            | gpg --dearmor | sudo tee /usr/share/keyrings/google-linux.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay "requests[socks]" DrissionPage xvfbwrapper SpeechRecognition pydub

      - name: Start gost relay (SOCKS5 -> HTTP)
        env:
          VPS8_PROXY: ${{ secrets.VPS8_PROXY }}
        run: |
          [ -n "${VPS8_PROXY:-}" ] || (echo "VPS8_PROXY is empty" && exit 1)

          docker pull ginuerzh/gost
          docker rm -f gost-relay || true
          docker run -d --name gost-relay -p 127.0.0.1:8080:8080 \
            ginuerzh/gost \
            -L=http://:8080 \
            -F="${VPS8_PROXY}"

          sleep 3
          docker ps --filter "name=gost-relay"
          docker logs --tail 50 gost-relay || true

      - name: Probe proxy chain
        run: |
          echo "== ip via gost http =="
          curl -x http://127.0.0.1:8080 https://api.ipify.org --max-time 25
          echo
          echo "== target via gost http =="
          curl -x http://127.0.0.1:8080 -I https://vps8.zz.cd/login -v --max-time 25

      - name: Run Script
        env:
          VPS8_USERNAME: ${{ secrets.VPS8_USERNAME }}
          VPS8_PASSWORD: ${{ secrets.VPS8_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: http://127.0.0.1:8080
        run: |
          [ -n "${VPS8_USERNAME:-}" ] || (echo "VPS8_USERNAME empty" && exit 1)
          [ -n "${VPS8_PASSWORD:-}" ] || (echo "VPS8_PASSWORD empty" && exit 1)

          # 兼容脚本读取的变量名
          export VPS8_ACCOUNTS="${VPS8_USERNAME}:${VPS8_PASSWORD}"
          export vps8_ACCOUNTS="${VPS8_USERNAME}:${VPS8_PASSWORD}"

          python main.py

      - name: Telegram notify on failure
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
            curl -sS "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ VPS8 workflow failed: ${GITHUB_WORKFLOW} #${GITHUB_RUN_NUMBER}"
          fi

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: |
            screenshots/**/*.png
            screenshots/**/*.html
            ./*.html
          if-no-files-found: ignore
          retention-days: 5
