name: Auto Renew Server Script

on:
  repository_dispatch:
    types: [vps]
  workflow_dispatch:

jobs:
  run-renew:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb ffmpeg unzip wget gnupg ca-certificates fontconfig \
            fonts-noto-cjk fonts-noto-color-emoji fonts-wqy-zenhei fonts-wqy-microhei fonts-liberation
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-linux.gpg >/dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay "requests[socks]" DrissionPage xvfbwrapper SpeechRecognition pydub

      - name: Run Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VPS8_USERNAME: ${{ secrets.VPS8_USERNAME }}
          VPS8_PASSWORD: ${{ secrets.VPS8_PASSWORD }}
          vps8_ACCOUNTS: "${{ secrets.VPS8_USERNAME }}:${{ secrets.VPS8_PASSWORD }}"
          PROXY: ${{ secrets.VPS8_PROXY }}
        run: python main.py

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: |
            screenshots/**/*.png
            screenshots/**/*.html
            ./*.html
          if-no-files-found: ignore
          retention-days: 5
